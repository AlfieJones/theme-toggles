name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.0.2"
        required: true

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      NPM_CONFIG_TOKEN: ${{ secrets.NPM_CONFIG_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate inputs
        run: |
          test -n "$NPM_CONFIG_TOKEN" || {
            echo "Missing NPM_CONFIG_TOKEN repository secret"
            exit 1
          }
          case "${{ inputs.version }}" in
            *-*) 
              echo "Version must be a stable release, for example 0.0.2"
              exit 1
              ;;
            *)
              ;;
          esac

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set publish versions
        run: |
          node <<'EOF'
          const fs = require("fs");
          const version = process.env.VERSION;
          const files = [
            "packages/toggles/package.json",
            "packages/react/package.json",
            "packages/svelte/package.json",
          ];

          for (const file of files) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            pkg.version = version;
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          EOF
        env:
          VERSION: ${{ inputs.version }}

      - name: Run checks
        run: bun run check

      - name: Publish toggles
        working-directory: packages/toggles
        run: bun publish --access public

      - name: Publish react
        working-directory: packages/react
        run: bun publish --access public

      - name: Publish svelte
        working-directory: packages/svelte
        run: bun publish --access public
