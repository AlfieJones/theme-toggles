name: Publish Svelte

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.0.2-beta.0"
        required: true

concurrency:
  group: publish-svelte
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Validate inputs
        run: |
          case "${{ inputs.version }}" in
            *-beta.*) ;;
            *)
              echo "Version must be a beta prerelease, for example 0.0.2-beta.0"
              exit 1
              ;;
          esac

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set publish version
        run: |
          node <<'EOF'
          const fs = require("fs");
          const file = "packages/svelte/package.json";
          const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
          pkg.version = process.env.VERSION;
          fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          EOF
        env:
          VERSION: ${{ inputs.version }}

      - name: Build packages
        run: bun run build

      - name: Publish svelte
        working-directory: packages/svelte
        run: npm publish --access public --tag beta
